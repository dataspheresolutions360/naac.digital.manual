                    item = db.categories.find(c => c.id === modalState.entityId); 
                    if (item) item.name = name; 
                    updateCategoryDropdown(); 
                } 
                else if (modalState.type === 'criteria') { item = db.criteria.find(c => c.id === modalState.entityId); item.totalMarks = marks; } 
                else if (modalState.type === 'ki') { item = db.keyIndicators.find(k => k.id === modalState.entityId); item.marks = marks; } 
                else if (modalState.type === 'metric') { 
                    item = db.metrics.find(m => m.id === modalState.entityId); 
                    item.description = description; 
                    item.documentsRequired = documentsRequired;
                    item.instructions = instructions;
                    item.marks = marks; 
                    item.type = document.getElementById('field_type').value; 
                    item.benchmark = document.getElementById('field_benchmark').value; 
                }
                if(item && modalState.type !== 'category') { item.number = num; item.name = name; }
            }
            
            saveDatabase();
            closeModal();
            render();
        });

        function openSettingsModal() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function closeSettingsModal() { document.getElementById('settingsModal').classList.add('hidden'); }

        function exportJSON() {
            const dataStr = JSON.stringify(db, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "naac_data_backup.json";
            link.click();
            closeSettingsModal();
        }

        function triggerImport() { document.getElementById('importFileInput').click(); }

        function stripHtmlForCsv(html) {
            if (!html) return '';
            let tmp = document.createElement("DIV");
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || "";
        }

        document.getElementById('importFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const importedDb = JSON.parse(event.target.result);
                    if (importedDb.categories && importedDb.criteria) {
                        db = importedDb;
                        state.category = db.categories.length > 0 ? db.categories[0].id : null;
                        
                        saveDatabase();

                        updateCategoryDropdown();
                        autoSelectFirstAvailable();
                        render();
                        closeSettingsModal();
                    } else {
                        alert('Invalid NAAC JSON file format.');
                    }
                } catch (err) {
                    alert('Error reading file.');
                }
            };
            reader.readAsText(file);
            this.value = '';
        });

        function exportCSV() {
            let csvContent = "Category,Criteria Number,Criteria Name,KI Number,KI Name,Metric Number,Metric Name,Description,Documents Required,Instructions,Type,Marks,Benchmark\n";
            db.metrics.forEach(m => {
                const ki = db.keyIndicators.find(k => k.id === m.kiId) || {};
                const cr = db.criteria.find(c => c.id === ki.criteriaId) || {};
                const cat = db.categories.find(c => c.id === cr.categoryId) || {};
                const escape = (text) => `"${String(text || '').replace(/"/g, '""')}"`;
                
                const cleanDesc = stripHtmlForCsv(m.description);
                const cleanDocs = stripHtmlForCsv(m.documentsRequired);
                const cleanInst = stripHtmlForCsv(m.instructions);

                const row = [cat.name, cr.number, cr.name, ki.number, ki.name, m.number, m.name, cleanDesc, cleanDocs, cleanInst, m.type, m.marks, m.benchmark].map(escape).join(",");
                csvContent += row + "\n";
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "naac_metrics_export.csv";
            link.click();
            closeSettingsModal();
        }

        function clearAllData() {
            if (state.isLocked) return alert('Dashboard is locked. Please unlock it to delete data.');
            if (confirm("WARNING: Are you sure you want to delete ALL data?")) {
                db.categories = [];
                db.criteria = [];
                db.keyIndicators = [];
                db.metrics = [];
                state.category = null;
                state.expandedCriteria.clear();
                state.selectedKI = 'dashboard';
                
                saveDatabase();

                updateCategoryDropdown();
                render();
                closeSettingsModal();
            }
        }

        // --- Expose functions to window for HTML inline event handlers ---
        window.toggleLock = toggleLock;
        window.expandAll = expandAll;
        window.collapseAll = collapseAll;
        window.toggleCriteria = toggleCriteria;
        window.selectKI = selectKI;
        window.editCurrentCategory = editCurrentCategory;
        window.deleteCurrentCategory = deleteCurrentCategory;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.deleteEntity = deleteEntity;
        window.openSettingsModal = openSettingsModal;
        window.closeSettingsModal = closeSettingsModal;
        window.exportJSON = exportJSON;
        window.triggerImport = triggerImport;
        window.exportCSV = exportCSV;
        window.clearAllData = clearAllData;

    </script>
</body>
</html>
